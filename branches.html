<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Our Branches | STARX INSTITUTE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          theme: {
            extend: {
              "colors": {
                "deep-navy": "#002147",
                "ochre-gold": "#D4AF37",
                "pure-white": "#FFFFFF",
                "background": "#faf9fd",
                "outline-variant": "#c4c6cf",
              },
              "fontFamily": {
                "headline-md": ["Montserrat"],
                "body-md": ["Inter"],
              }
            }
          }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .branch-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 33, 71, 0.1);
        }
    </style>
</head>
<body class="bg-background text-slate-800 font-body-md antialiased overflow-x-hidden">

<!-- Header (Matching index.html style) -->
<nav class="sticky top-0 z-50 bg-pure-white border-b border-outline-variant shadow-sm h-20 flex items-center">
    <div class="flex justify-between items-center w-full px-6 max-w-[1200px] mx-auto">
        <div class="text-headline-md font-headline-md font-bold text-deep-navy uppercase">
            Starx<span class="text-ochre-gold">Institute</span>
        </div>
        <div class="hidden md:flex items-center gap-8">
            <a class="text-xs font-bold text-slate-600 hover:text-ochre-gold transition-colors uppercase tracking-widest" href="index.html">Home</a>
            <a class="text-xs font-bold text-slate-600 hover:text-ochre-gold transition-colors uppercase tracking-widest" href="batches.html">Courses</a>
            <a class="text-xs font-bold text-deep-navy border-b-2 border-ochre-gold pb-1 uppercase tracking-widest" href="branches.html">Branches</a>
            <a class="text-xs font-bold text-slate-600 hover:text-ochre-gold transition-colors uppercase tracking-widest" href="contact.html">Admissions</a>
        </div>
        <button class="bg-deep-navy text-pure-white px-6 py-2.5 rounded-lg text-xs font-bold uppercase tracking-widest md:hidden" id="mobile-menu-btn">Menu</button>
    </div>
</nav>

<!-- Mobile Overlay -->
<div class="fixed inset-0 z-[60] bg-deep-navy/95 transition-transform translate-x-full duration-300" id="mobile-overlay">
    <div class="p-8 flex flex-col h-full text-pure-white">
        <div class="flex justify-between items-center mb-12">
            <span class="text-xl font-bold text-ochre-gold uppercase">Starx Institute</span>
            <button id="close-menu-btn" class="p-2"><span class="material-symbols-outlined text-3xl">close</span></button>
        </div>
        <nav class="flex flex-col gap-10">
            <a class="text-2xl font-bold opacity-70" href="index.html">HOME</a>
            <a class="text-2xl font-bold opacity-70" href="batches.html">COURSES</a>
            <a class="text-2xl font-bold text-ochre-gold" href="branches.html">BRANCHES</a>
            <a class="text-2xl font-bold opacity-70" href="contact.html">ADMISSIONS</a>
        </nav>
    </div>
</div>

<header class="bg-deep-navy py-16 text-center">
    <span class="text-ochre-gold text-xs font-bold tracking-[0.3em] uppercase mb-4 block">Smart Campuses</span>
    <h1 class="text-3xl md:text-5xl font-bold text-pure-white mb-6">Our Branch Network</h1>
    <p class="text-pure-white/60 max-w-xl mx-auto px-6">Explore our prime locations across Delhi and NCR, featuring world-class infrastructure and safety-first campuses.</p>
</header>

<main class="max-w-[1200px] mx-auto px-6 py-16">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="branches-container">
        <!-- Branches will be injected from main.js -->
        <div class="p-8 bg-slate-100 rounded-2xl animate-pulse h-64"></div>
        <div class="p-8 bg-slate-100 rounded-2xl animate-pulse h-64"></div>
        <div class="p-8 bg-slate-100 rounded-2xl animate-pulse h-64"></div>
    </div>
</main>

<footer class="bg-deep-navy py-12 text-center text-pure-white/40 text-[10px] uppercase tracking-widest border-t border-white/5">
    © 2026 Starx Institute Group. All Rights Reserved.
</footer>

<script src="js/main.js"></script>
<script>
    // Initialize mobile menu for this page
    const menuBtn = document.getElementById('mobile-menu-btn');
    const closeBtn = document.getElementById('close-menu-btn');
    const overlay = document.getElementById('mobile-overlay');

    menuBtn?.addEventListener('click', () => {
        overlay.classList.remove('translate-x-full');
        document.body.style.overflow = 'hidden';
    });

    closeBtn?.addEventListener('click', () => {
        overlay.classList.add('translate-x-full');
        document.body.style.overflow = '';
    });

    // Populate branches if registry exists
    window.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('branches-container');
        if (typeof starxBranchesRegistry !== 'undefined') {
            container.innerHTML = '';
            starxBranchesRegistry.forEach(branch => {
                const card = document.createElement('div');
                card.className = 'p-8 bg-pure-white rounded-2xl shadow-sm border border-outline-variant branch-card transition-all flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <div class="w-12 h-12 bg-ochre-gold/10 text-ochre-gold rounded-lg flex items-center justify-center mb-6">
                            <span class="material-symbols-outlined">location_on</span>
                        </div>
                        <h3 class="text-xl font-bold text-deep-navy mb-2 uppercase tracking-wide">${branch.name}</h3>
                        <p class="text-sm text-slate-500 mb-6 font-medium">${branch.location}</p>
                    </div>
                    <div class="pt-6 border-t border-slate-100 space-y-3">
                        <div class="flex items-center gap-3 text-xs text-slate-600 font-bold uppercase tracking-wider">
                            <span class="material-symbols-outlined text-[16px] text-ochre-gold">phone</span>
                            ${branch.helpline}
                        </div>
                        <button class="w-full mt-4 border border-deep-navy text-deep-navy py-3 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-deep-navy hover:text-white transition-all">
                            View on Map
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    });
</script>
</body>
</html>
